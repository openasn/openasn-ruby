name: Tests

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - "LICENSE.txt"
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "LICENSE.txt"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.1", "3.2", "3.3", "3.4", "4.0"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      # Numbers are informational (shared-runner noise), but the generous
      # 100µs ceiling is asserted: it can only trip on an algorithmic
      # regression (e.g. a binary search degrading to a scan), not noise.
      - name: Benchmark (regression tripwire at 4x the perf target)
        env:
          BENCH_MAX_US: "100"
        run: bundle exec rake bench

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ruby-${{ matrix.ruby_version }}
          path: test/reports/
          retention-days: 7
